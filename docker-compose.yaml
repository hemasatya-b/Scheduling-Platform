services:
  postgres:
    image: postgres:15-alpine
    container_name: scheduling-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scheduling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduling}
      POSTGRES_DB: ${POSTGRES_DB:-scheduling_platform}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scheduling} -d ${POSTGRES_DB:-scheduling_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
