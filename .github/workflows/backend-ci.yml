name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

env:
  DATABASE_URL: postgresql://scheduling:scheduling@localhost:5432/scheduling_platform_test?schema=public

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: scheduling
          POSTGRES_PASSWORD: scheduling
          POSTGRES_DB: scheduling_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scheduling"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm generate

      - name: Type-check
        run: pnpm lint

      - name: Apply Prisma migrations
        run: pnpm prisma migrate deploy

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
